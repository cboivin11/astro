<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spectroscopie — Prisme interactif</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #06060f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
  .wrap { position: relative; display: inline-block; width: min(680px, 100vw); }
  svg { display: block; width: 100%; }
  .btn-overlay { position: absolute; display: flex; flex-direction: column; align-items: center; }
  .color-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); cursor: pointer; transition: transform .15s, border-color .15s; outline: none; padding: 0; flex-shrink: 0; }
  .color-btn:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.7); }
  .color-btn.active { border-color: #fff; transform: scale(1.22); box-shadow: 0 0 6px rgba(255,255,255,0.6); }
  @keyframes draw-ray { to { stroke-dashoffset: 0; } }
  @keyframes fade-in  { to { opacity: 1; } }
  @keyframes travel-x { 0%{transform:translateX(0);opacity:0} 10%{opacity:1} 85%{opacity:1} 100%{transform:translateX(110px);opacity:0} }
  @keyframes bulb-pulse { 0%,100%{opacity:.25} 50%{opacity:.45} }
  @keyframes flicker    { 0%{opacity:.85} 100%{opacity:1} }
  @keyframes pulse-glow { 0%,100%{opacity:.85} 50%{opacity:1} }
  .ray  { stroke-dasharray:300; stroke-dashoffset:300; animation:draw-ray var(--dur,.6s) ease-out var(--delay,0s) forwards; }
  .beam { stroke-dasharray:200; stroke-dashoffset:200; animation:draw-ray .5s ease-out forwards; }
  .lf   { opacity:0; animation:fade-in .4s ease-out var(--ld,.8s) forwards; }
  .photon { animation:travel-x 2.2s linear infinite; }
  .bg   { animation:bulb-pulse 1.8s ease-in-out infinite; }
  .fil  { animation:flicker .12s ease-in-out infinite alternate; }
  .sg   { animation:pulse-glow 2.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <svg id="main-svg" viewBox="0 0 680 430"></svg>
  <div class="btn-overlay" id="btn-overlay"></div>
</div>
<script>
const BANDS = [
  { name:'violet', y:94,  h:28, color:'#9900dd', tc:'#cc88ff', nm:'~400 nm' },
  { name:'bleu',   y:122, h:29, color:'#3355ff', tc:'#88aaff', nm:'~450 nm' },
  { name:'cyan',   y:151, h:29, color:'#0099ff', tc:'#66ccff', nm:'~490 nm' },
  { name:'vert',   y:180, h:28, color:'#00cc44', tc:'#55dd88', nm:'~530 nm' },
  { name:'jaune',  y:208, h:29, color:'#cccc00', tc:'#eeee44', nm:'~580 nm' },
  { name:'orange', y:237, h:28, color:'#ff8800', tc:'#ffaa44', nm:'~610 nm' },
  { name:'rouge',  y:265, h:29, color:'#ff2200', tc:'#ff7766', nm:'~700 nm' },
];
const SOURCES = [
  { id:'purple', label:'Violet', labelFr:'violette', btnColor:'#9900dd', bulbA:'#f0eeff', bulbB:'#cc66ff', glowColor:'#aa44ff', beamColor:'#9900dd', present:[0,1],           bandIdx:0 },
  { id:'blue',   label:'Bleu',   labelFr:'bleue',    btnColor:'#2255ff', bulbA:'#eeeeff', bulbB:'#4488ff', glowColor:'#3366ff', beamColor:'#2255ff', present:[1,2],           bandIdx:1 },
  { id:'cyan',   label:'Cyan',   labelFr:'cyan',     btnColor:'#0099ff', bulbA:'#e0f4ff', bulbB:'#44ccff', glowColor:'#00ccff', beamColor:'#0099ff', present:[2,3],           bandIdx:2 },
  { id:'green',  label:'Vert',   labelFr:'verte',    btnColor:'#00cc44', bulbA:'#eeffee', bulbB:'#44ff88', glowColor:'#00ff66', beamColor:'#00dd44', present:[3,4],           bandIdx:3 },
  { id:'yellow', label:'Jaune',  labelFr:'jaune',    btnColor:'#ffdd00', bulbA:'#fffde0', bulbB:'#ffee44', glowColor:'#ffee00', beamColor:'#ffdd00', present:[4,5,6],         bandIdx:4 },
  { id:'orange', label:'Orange', labelFr:'orange',   btnColor:'#ff8800', bulbA:'#fff3e0', bulbB:'#ffaa44', glowColor:'#ff9900', beamColor:'#ff8800', present:[5,6],           bandIdx:5 },
  { id:'red',    label:'Rouge',  labelFr:'rouge',    btnColor:'#ff2200', bulbA:'#ffeeee', bulbB:'#ff4422', glowColor:'#ff3300', beamColor:'#ff4400', present:[6],             bandIdx:6 },
  { id:'white',  label:'Blanc',  labelFr:'blanche',  btnColor:'#fffde8', bulbA:'#ffffff', bulbB:'#e8f4ff', glowColor:'#e0eeff', beamColor:'#f0f4ff', present:[0,1,2,3,4,5,6], bandIdx:null },
];
let current = 'white';

function positionButtons() {
  const svg = document.getElementById('main-svg');
  const wrap = document.getElementById('wrap');
  const overlay = document.getElementById('btn-overlay');
  const svgRect = svg.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const scaleY = svgRect.height / 430;
  const scaleX = svgRect.width / 680;
  const svgX = 474, svgYTop = 90, svgYBot = 320;
  overlay.style.left   = (svgRect.left - wrapRect.left + svgX * scaleX - 11) + 'px';
  overlay.style.top    = (svgRect.top  - wrapRect.top  + svgYTop * scaleY) + 'px';
  overlay.style.width  = '22px';
  overlay.style.height = ((svgYBot - svgYTop) * scaleY) + 'px';
  const buttons = overlay.querySelectorAll('.color-btn');
  SOURCES.forEach((s, i) => {
    const btn = buttons[i];
    let svgBtnCenterY = s.bandIdx === null ? 294+8+5 : BANDS[s.bandIdx].y + BANDS[s.bandIdx].h/2;
    btn.style.position = 'absolute';
    btn.style.top  = ((svgBtnCenterY - svgYTop) * scaleY - 11) + 'px';
    btn.style.left = '0';
  });
}

const overlay = document.getElementById('btn-overlay');
SOURCES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (s.id === current ? ' active' : '');
  btn.title = s.label;
  btn.style.background = s.btnColor;
  btn.addEventListener('click', () => {
    current = s.id;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  overlay.appendChild(btn);
});

function getBandOutY(i) { return BANDS[i].y + BANDS[i].h/2; }

function render() {
  const s = SOURCES.find(x => x.id === current);
  const svg = document.getElementById('main-svg');
  const presentSet = new Set(s.present);
  const rayYsIn = [174,176,178,180,182,184,186];
  const raysIn = BANDS.map((b,i) => {
    const col = presentSet.has(i) ? b.color : '#111';
    const op  = presentSet.has(i) ? '1' : '0.05';
    return `<line class="ray" x1="241" y1="${rayYsIn[i]}" x2="308" y2="${162+i*3.5}" stroke="${col}" stroke-width="1.8" opacity="${op}" style="--dur:0.5s;--delay:${0.5+i*0.05}s"/>`;
  }).join('');
  const raysOut = BANDS.map((b,i) => {
    if (!presentSet.has(i)) return '';
    return `<line class="ray" x1="308" y1="${162+i*3.5}" x2="522" y2="${getBandOutY(i)}" stroke="${b.color}" stroke-width="2.2" opacity="0.95" style="--dur:0.7s;--delay:${1.0+i*0.05}s"/>`;
  }).join('');
  const screenBands = BANDS.map((b,i) =>
    `<rect x="522" y="${b.y}" width="16" height="${b.h}" fill="${presentSet.has(i)?b.color:'#111111'}" opacity="0.95"/>`
  ).join('');
  const labelsStr = BANDS.map((b,i) => {
    const tc  = presentSet.has(i) ? b.tc : '#333333';
    const sc  = presentSet.has(i) ? b.color : '#222222';
    const txt = presentSet.has(i) ? `${b.name} ${b.nm}` : '(absent)';
    return `<g class="lf" style="--ld:${2.0+i*0.08}s"><line x1="538" y1="${b.y+b.h/2}" x2="564" y2="${b.y+b.h/2}" stroke="${sc}" stroke-width="0.5" stroke-dasharray="3 2" opacity="${presentSet.has(i)?'0.7':'0.3'}"/><text x="568" y="${b.y+b.h/2+4}" font-size="11" fill="${tc}" font-family="system-ui">${txt}</text></g>`;
  }).join('');
  const subLabel = s.id==='white' ? "(toutes λ mélangées)" : "longueurs d'onde sélectives";
  const filColor = s.id==='white' ? '#ccddff' : '#fff7a0';

  svg.innerHTML = `<defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d0d1f"/><stop offset="100%" stop-color="#06060f"/></linearGradient>
    <linearGradient id="beam-g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${s.beamColor}" stop-opacity="0.9"/><stop offset="100%" stop-color="${s.beamColor}" stop-opacity="0.1"/></linearGradient>
    <radialGradient id="bulb-o" cx="42%" cy="38%" r="52%"><stop offset="0%" stop-color="${s.bulbA}"/><stop offset="45%" stop-color="${s.bulbB}" stop-opacity="0.85"/><stop offset="100%" stop-color="${s.glowColor}" stop-opacity="0.4"/></radialGradient>
    <radialGradient id="bulb-gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${s.glowColor}" stop-opacity="0.55"/><stop offset="100%" stop-color="${s.glowColor}" stop-opacity="0"/></radialGradient>
    <linearGradient id="sock-g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#555"/><stop offset="30%" stop-color="#999"/><stop offset="60%" stop-color="#777"/><stop offset="100%" stop-color="#444"/></linearGradient>
    <linearGradient id="sock-b" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#333"/><stop offset="50%" stop-color="#666"/><stop offset="100%" stop-color="#2a2a2a"/></linearGradient>
    <linearGradient id="pfl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a8d8f0" stop-opacity="0.15"/><stop offset="100%" stop-color="#d0eeff" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="pfr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c0e8ff" stop-opacity="0.45"/><stop offset="100%" stop-color="#7ab8d8" stop-opacity="0.2"/></linearGradient>
    <linearGradient id="pfb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88bbdd" stop-opacity="0.5"/><stop offset="100%" stop-color="#446688" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="pel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#aaddff" stop-opacity="0.4"/></linearGradient>
    <linearGradient id="ph" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="scr-f" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#555"/><stop offset="50%" stop-color="#888"/><stop offset="100%" stop-color="#444"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="680" height="430" fill="url(#bg-g)" rx="12"/>
  <text x="310" y="28" text-anchor="middle" font-size="13" font-weight="500" fill="#c0bdb0" font-family="system-ui">Lumière traversant un prisme</text>
  <ellipse class="bg" cx="97" cy="168" rx="54" ry="58" fill="url(#bulb-gl)"/>
  <ellipse cx="97" cy="168" rx="34" ry="37" fill="url(#bulb-o)" opacity="0.95"/>
  <ellipse cx="86" cy="155" rx="10" ry="13" fill="white" opacity="0.35"/>
  <ellipse cx="82" cy="151" rx="5" ry="6" fill="white" opacity="0.5"/>
  <g class="fil">
    <polyline points="93,178 96,168 93,162 97,155 101,162 98,168 101,178" fill="none" stroke="${filColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="93" y1="178" x2="93" y2="185" stroke="#aaa" stroke-width="1"/>
    <line x1="101" y1="178" x2="101" y2="185" stroke="#aaa" stroke-width="1"/>
  </g>
  <path d="M 80 198 Q 82 208 86 212 L 108 212 Q 112 208 114 198 Z" fill="#b8b0a0" opacity="0.6"/>
  <rect x="84" y="211" width="26" height="6" rx="1" fill="url(#sock-g)"/>
  <rect x="83" y="216" width="28" height="4" fill="#444"/>
  <rect x="84" y="219" width="26" height="6" fill="url(#sock-g)"/>
  <rect x="83" y="224" width="28" height="4" fill="#333"/>
  <rect x="84" y="227" width="26" height="8" rx="1" fill="url(#sock-b)"/>
  <text x="97" y="250" text-anchor="middle" font-size="11" fill="#aaa898" font-family="system-ui">lumière ${s.labelFr}</text>
  <text x="97" y="262" text-anchor="middle" font-size="10" fill="#7a7870" font-family="system-ui">${subLabel}</text>
  <rect class="beam" x="131" y="173" width="110" height="12" rx="2" fill="url(#beam-g)"/>
  <circle class="photon" cx="145" cy="179" r="2.5" fill="${s.beamColor}" opacity="0" style="animation-delay:0s"/>
  <circle class="photon" cx="145" cy="179" r="2.5" fill="${s.beamColor}" opacity="0" style="animation-delay:0.75s"/>
  <circle class="photon" cx="145" cy="179" r="2.5" fill="${s.beamColor}" opacity="0" style="animation-delay:1.5s"/>
  <polygon points="292,78 378,288 206,288" fill="#000" opacity="0.35" transform="translate(6,8)"/>
  <polygon points="292,78 206,288 292,288" fill="url(#pfl)"/>
  <polygon points="292,78 378,288 292,288" fill="url(#pfr)"/>
  <polygon points="206,288 378,288 292,288" fill="url(#pfb)"/>
  <line x1="292" y1="78" x2="206" y2="288" stroke="url(#pel)" stroke-width="2"/>
  <line x1="292" y1="78" x2="378" y2="288" stroke="#aaddff" stroke-width="1" opacity="0.5"/>
  <line x1="206" y1="288" x2="378" y2="288" stroke="#88bbcc" stroke-width="1.5" opacity="0.6"/>
  <polygon points="292,110 230,270 270,270" fill="url(#ph)" opacity="0.18"/>
  <ellipse cx="292" cy="84" rx="5" ry="3" fill="white" opacity="0.7"/>
  <text x="292" y="232" text-anchor="middle" font-size="12" font-weight="500" fill="#000" font-family="system-ui">Prisme</text>
  <text x="292" y="246" text-anchor="middle" font-size="10" fill="#000" font-family="system-ui">verre optique</text>
  ${raysIn}${raysOut}
  <rect x="516" y="90" width="12" height="208" rx="3" fill="url(#scr-f)"/>
  <rect x="522" y="94" width="16" height="200" rx="2" fill="#111" class="sg lf" style="--ld:1.9s"/>
  <g class="sg lf" style="--ld:1.95s">${screenBands}</g>
  <rect x="456" y="90" width="58" height="230" rx="4" fill="#0a0a14" opacity="0.85"/>
  <text x="485" y="86" text-anchor="middle" font-size="9" fill="#555" font-family="system-ui">source</text>
  ${labelsStr}
  <g class="lf" style="--ld:2.7s">
    <text x="300" y="350" text-anchor="middle" font-size="11" fill="#7a7870" font-family="system-ui">Indice de réfraction n(λ) : le violet est plus dévié que le rouge</text>
    <text x="300" y="366" text-anchor="middle" font-size="10" fill="#565450" font-family="system-ui">n violet ≈ 1,53   ·   n rouge ≈ 1,51</text>
  </g>
  <g class="lf" style="--ld:2.8s">
    <path d="M 248 300 Q 252 288 260 280" fill="none" stroke="#567a8c" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="232" y="308" text-anchor="middle" font-size="10" fill="#567a8c" font-family="system-ui">angle de</text>
    <text x="232" y="320" text-anchor="middle" font-size="10" fill="#567a8c" font-family="system-ui">réfraction</text>
  </g>
  <g class="lf" style="--ld:2.9s">
    <text x="530" y="316" text-anchor="middle" font-size="11" font-weight="500" fill="#aaa898" font-family="system-ui">Écran</text>
    <text x="530" y="328" text-anchor="middle" font-size="10" fill="#7a7870" font-family="system-ui">spectre</text>
  </g>`;
  requestAnimationFrame(positionButtons);
}
window.addEventListener('resize', positionButtons);
render();
</script>
</body>
</html>
