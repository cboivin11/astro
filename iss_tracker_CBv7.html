    <style>
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}

/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {

.leaflet-popup-pane,

.leaflet-marker-icon,

.leaflet-container {

	}
.leaflet-zoom-box {

	}


/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;

	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;

	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {

	}

	}

/* zoom control */

.leaflet-control-zoom-in,
.leaflet-control-zoom-out {
	font: bold 18px 'Lucida Console', Monaco, monospace;
	text-indent: 1px;
	}

.leaflet-touch .leaflet-control-zoom-in, .leaflet-touch .leaflet-control-zoom-out  {
	font-size: 22px;
	}


/* layers control */

.leaflet-control-layers {
	box-shadow: 0 1px 5px rgba(0,0,0,0.4);
	background: #fff;
	border-radius: 5px;
	}
.leaflet-control-layers-toggle {
	background-image: url(images/layers.png);

	}
.leaflet-retina .leaflet-control-layers-toggle {
	background-image: url(images/layers-2x.png);

	}
.leaflet-touch .leaflet-control-layers-toggle {

	}
.leaflet-control-layers .leaflet-control-layers-list,

	}
.leaflet-control-layers-expanded .leaflet-control-layers-list {

.leaflet-control-layers-expanded {

.leaflet-control-layers-scrollbar {

.leaflet-control-layers-selector {

	}
.leaflet-control-layers label {
	display: block;
	font-size: 13px;
	font-size: 1.08333em;
	}
.leaflet-control-layers-separator {
	height: 0;
	border-top: 1px solid #ddd;
	margin: 5px -10px 5px -6px;
	}

/* Default icon URLs */
.leaflet-default-icon-path { /* used only in path-guessing heuristic, see L.Icon.Default */
	background-image: url(images/marker-icon.png);
	}


/* attribution and scale controls */

.leaflet-container .leaflet-control-attribution {
	background: #fff;

	}
.leaflet-control-attribution,
.leaflet-control-scale-line {
	padding: 0 5px;

.leaflet-attribution-flag {

.leaflet-left .leaflet-control-scale {

.leaflet-bottom .leaflet-control-scale {

.leaflet-control-scale-line {

	white-space: nowrap;
	-moz-box-sizing: border-box;

.leaflet-control-scale-line:not(:first-child) {

	border-bottom: none;
	margin-top: -2px;
	}
.leaflet-control-scale-line:not(:first-child):not(:last-child) {

	}

.leaflet-touch .leaflet-control-attribution,
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	box-shadow: none;
	}
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	border: 2px solid rgba(0,0,0,0.2);
	background-clip: padding-box;
	}


/* popup */

.leaflet-popup {
	position: absolute;
	text-align: center;
	margin-bottom: 20px;
	}
.leaflet-popup-content-wrapper {
	padding: 1px;

	}
.leaflet-popup-content {

	-webkit-transform: rotate(45deg);
	   -moz-transform: rotate(45deg);
	    -ms-transform: rotate(45deg);

.leaflet-popup-content-wrapper,
.leaflet-popup-tip {

.leaflet-container a.leaflet-popup-close-button {

.leaflet-popup-scrolled {

.leaflet-oldie .leaflet-popup-content-wrapper {

.leaflet-oldie .leaflet-popup-tip {

	-ms-filter: "progid:DXImageTransform.Microsoft.Matrix(M11=0.70710678, M12=0.70710678, M21=-0.70710678, M22=0.70710678)";
	filter: progid:DXImageTransform.Microsoft.Matrix(M11=0.70710678, M12=0.70710678, M21=-0.70710678, M22=0.70710678);

.leaflet-oldie .leaflet-control-zoom,

/* div icon */

.leaflet-div-icon {

	}


/* Tooltip */
/* Base styles for the element that has a tooltip */
.leaflet-tooltip {
	position: absolute;
	padding: 6px;
	background-color: #fff;
	border: 1px solid #fff;
	border-radius: 3px;
	color: #222;
	white-space: nowrap;

.leaflet-tooltip-top:before,
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	position: absolute;
	pointer-events: none;
	border: 6px solid transparent;
	background: transparent;
	content: "";
	}

/* Directions */

.leaflet-tooltip-bottom {
	margin-top: 6px;
}
.leaflet-tooltip-top {
	margin-top: -6px;
}
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-top:before {
	left: 50%;
	margin-left: -6px;
	}
.leaflet-tooltip-top:before {
	bottom: 0;
	margin-bottom: -12px;

	}
.leaflet-tooltip-bottom:before {
	top: 0;
	margin-top: -12px;
	margin-left: -6px;
	border-bottom-color: #fff;
	}
.leaflet-tooltip-left {
	margin-left: -6px;
}
.leaflet-tooltip-right {
	margin-left: 6px;
}
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	top: 50%;
	margin-top: -6px;
	}
.leaflet-tooltip-left:before {

.leaflet-tooltip-right:before {

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .panel {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: move;
            user-select: none;
        }

        .panel:active {
            cursor: grabbing;
        }

        .info-panel {
            top: 20px;
            right: 20px;
            min-width: 280px;
        }

        .info-panel h2 {
            margin-bottom: 15px;
            color: #60a5fa;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-item {
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .info-label {
            color: #94a3b8;
            font-size: 0.85em;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #e2e8f0;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .astronauts-panel {
            top: 200px;
            left: 20px;
            max-width: 350px;
        }

        .astronauts-panel h3 {
            margin: 0 0 12px 0;
            color: #60a5fa;
            font-size: 1em;
            text-align: center;
        }

        .crew-count {
            text-align: center;
            background: rgba(96, 165, 250, 0.2);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            color: #60a5fa;
            font-size: 0.9em;
        }

        .passes-panel {
            bottom: 30px;
            left: 20px;
            max-width: 350px;
            max-height: 400px;
            overflow-y: auto;
        }

        .passes-panel h3 {
            margin: 0 0 8px 0;
            color: #60a5fa;
            font-size: 1em;
            text-align: center;
        }

        .location-info {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pass-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }

        .pass-item.excellent {
            border-left-color: #10b981;
        }

        .pass-item.good {
            border-left-color: #3b82f6;
        }

        .pass-item.fair {
            border-left-color: #f59e0b;
        }

        .pass-time {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .pass-details {
            font-size: 0.85em;
            color: #94a3b8;
            line-height: 1.4;
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }

        .zoom-control {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 200px;
            cursor: move;
        }

        .zoom-control h3 {
            margin: 0 0 10px 0;
            color: #60a5fa;
            font-size: 0.9em;
            text-align: center;
        }

        .zoom-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1e293b;
            outline: none;
            -webkit-appearance: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .zoom-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .zoom-value {
            text-align: center;
            margin-top: 8px;
            color: #94a3b8;
            font-size: 0.85em;
        }

        .zoom-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }

        .zoom-btn {
            flex: 1;
            padding: 8px;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #60a5fa;
            border-radius: 6px;
            color: #60a5fa;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: rgba(96, 165, 250, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="panel info-panel">
        <h2>
            <span>🛰️</span>
            Station Spatiale ISS
            <span class="status-indicator"></span>
        </h2>
        <div class="info-item">
            <div class="info-label">Latitude</div>
            <div class="info-value" id="latitude">Chargement...</div>
        </div>
        <div class="info-item">
            <div class="info-label">Longitude</div>
            <div class="info-value" id="longitude">--</div>
        </div>
        <div class="info-item">
            <div class="info-label">Altitude</div>
            <div class="info-value" id="altitude">--</div>
        </div>
        <div class="info-item">
            <div class="info-label">Vitesse</div>
            <div class="info-value" id="velocity">--</div>
        </div>
        <div class="info-item">
            <div class="info-label">Heure locale (Québec)</div>
            <div class="info-value" id="localTime">--</div>
        </div>
    </div>

    <div class="panel astronauts-panel">
        <h3>👨‍🚀 Astronautes à bord de l'ISS</h3>
        <div id="astronautsList">
            <div class="loading">Chargement des données...</div>
        </div>
    </div>

    <div class="panel passes-panel">
        <h3>🛰️ Passages visibles - Québec</h3>
        <div class="location-info">
            <small>Lat: 48.5° | Lon: -72.4°</small><br>
            <small style="color: #60a5fa;">Rayon détection: 1500 km</small>
        </div>
        <div id="passesList">
            <div class="loading">Calcul des passages...</div>
        </div>
    </div>

    <div class="panel zoom-control">
        <h3>🔍 Zoom</h3>
        <input type="range" min="1" max="18" step="0.1" value="3" class="zoom-slider" id="zoomSlider">
        <div class="zoom-value">Niveau: <span id="zoomLevel">3.0</span></div>
        <div class="zoom-buttons">
            <button class="zoom-btn" id="zoomOut">➖ Zoom -</button>
            <button class="zoom-btn" id="zoomIn">➕ Zoom +</button>
        </div>
    </div>

    <script>
        console.log('🚀 Démarrage ISS Tracker...');
        
        // Variables globales
        let map, issMarker, orbitLayerGroup, terminatorLayer, futureOrbitLayer;
        let satrec = null;
        const orbitCoordinates = [];
        const maxOrbitPoints = 100;
        
        // TLE par défaut (janvier 2024)
        const defaultTLE = {
            line1: '1 25544U 98067A   26149.50000000  .00016717  00000-0  30270-3 0  9001',
            line2: '2 25544  51.6414 112.3521 0004012  85.6210 274.5360 15.50183074500123'
        };
        
        // Initialiser la carte
        function initMap() {
            console.log('📍 Initialisation carte...');
            map = L.map('map', {
                center: [0, 0],
                zoom: 3,
                worldCopyJump: false,
                zoomControl: false,
                zoomSnap: 0.1,
                zoomDelta: 0.25
            });

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri',
                maxZoom: 18
            }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', {
                attribution: 'CARTO',
                maxZoom: 19,
                pane: 'shadowPane'
            }).addTo(map);

            orbitLayerGroup = L.layerGroup().addTo(map);
            
            // Forcer le z-index pour s'assurer que l'orbite est visible
            const orbitPane = map.createPane('orbitPane');
            orbitPane.style.zIndex = 650; // Au-dessus de la carte (400) mais sous les markers (600)

            // Cercles de visibilité Québec
            L.circle([48.5, -72.4], {
                color: '#ef4444',
                fillColor: '#ef4444',
                fillOpacity: 0.2,
                radius: 1000000,
                weight: 3
            }).addTo(map);

            L.circle([48.5, -72.4], {
                color: '#3b82f6',
                fillColor: '#3b82f6',
                fillOpacity: 0.1,
                radius: 1500000,
                weight: 2,
                dashArray: '10, 10'
            }).addTo(map);

            L.marker([48.5, -72.4], {
                icon: L.divIcon({
                    html: '<div style="width: 12px; height: 12px; background: #ef4444; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);"></div>',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                })
            }).addTo(map).bindPopup('<b>Point de référence - Québec</b><br>Lat: 48.5°<br>Lon: -72.4°<br><br>🔴 Rayon rouge: 1000 km<br>🔵 Rayon bleu: 1500 km');

            console.log('✓ Carte initialisée');
        }
        
        // Récupérer et initialiser TLE
        async function initTLE() {
            console.log('📡 Chargement TLE...');
            try {
                // Try multiple TLE sources with CORS proxies
            let response = null;
            const tleUrls = [
                'https://corsproxy.io/?url=https://celestrak.org/NORAD/elements/gp.php?CATNR=25544%26FORMAT=TLE',
                'https://api.allorigins.win/raw?url=https://celestrak.org/NORAD/elements/gp.php?CATNR=25544%26FORMAT=TLE',
            ];
            for (const url of tleUrls) {
                try {
                    response = await fetch(url);
                    if (response.ok) break;
                } catch(e) { continue; }
            }
            if (!response || !response.ok) throw new Error('All TLE sources failed');
                const text = await response.text();
                const lines = text.trim().split('\n');
                
                if (lines.length >= 3) {
                    satrec = satellite.twoline2satrec(lines[1].trim(), lines[2].trim());
                    console.log('✓ TLE chargés depuis CelesTrak');
                } else {
                    throw new Error('Format TLE invalide');
                }
            } catch (error) {
                console.warn('⚠ Erreur TLE CelesTrak, utilisation TLE par défaut');
                satrec = satellite.twoline2satrec(defaultTLE.line1, defaultTLE.line2);
                console.log('✓ TLE par défaut chargés');
            }
        }
        
        // Calculer position ISS depuis TLE
        function getISSPosition(date = new Date()) {
            if (!satrec) return null;
            
            const positionAndVelocity = satellite.propagate(satrec, date);
            if (!positionAndVelocity.position) return null;
            
            const gmst = satellite.gstime(date);
            const positionGd = satellite.eciToGeodetic(positionAndVelocity.position, gmst);
            
            const velocityEci = positionAndVelocity.velocity;
            const speed = Math.sqrt(
                velocityEci.x * velocityEci.x +
                velocityEci.y * velocityEci.y +
                velocityEci.z * velocityEci.z
            ) * 3600;
            
            return {
                lat: satellite.degreesLat(positionGd.latitude),
                lon: satellite.degreesLong(positionGd.longitude),
                alt: positionGd.height,
                vel: speed
            };
        }

                let segments = [];
                let currentSegment = [orbitCoordinates[0]];
                
                for (let i = 1; i < orbitCoordinates.length; i++) {
                    const prevLon = orbitCoordinates[i - 1][1];
                    const currLon = orbitCoordinates[i][1];
                    const lonDiff = Math.abs(currLon - prevLon);
                    
                    // Détecter le saut antiméridien
                    if (lonDiff > 150) {
                        if (currentSegment.length >= 2) {
                            segments.push([...currentSegment]);
                        }
                        currentSegment = [orbitCoordinates[i]];
                    } else {
                        currentSegment.push(orbitCoordinates[i]);
                    }
                }

                    segments.push([...currentSegment]);
                }
                
                console.log('🔵 Segments orbite:', segments.length);

                    const polyline = L.polyline(segment, {
                        color: '#60a5fa',
                        weight: 3,
                        opacity: 0.8,
                        smoothFactor: 1,
                        interactive: false,
                        pane: 'orbitPane'
                    });
                    orbitLayerGroup.addLayer(polyline);
                });
            }

            document.getElementById('latitude').textContent = pos.lat.toFixed(4) + '°';
            document.getElementById('longitude').textContent = pos.lon.toFixed(4) + '°';
            document.getElementById('altitude').textContent = pos.alt.toFixed(2) + ' km';
            document.getElementById('velocity').textContent = pos.vel.toFixed(2) + ' km/h';
            
            const now = new Date();
            const quebecTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Montreal' }));
            const timeStr = quebecTime.toLocaleString('fr-CA', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false
            });
            document.getElementById('localTime').textContent = timeStr;
        }
        
        // Calculer passages
        async function calculatePasses() {
            if (!satrec) return;
            
            const passes = [];
            const now = new Date();
            const endTime = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            
            let inPass = false;
            let passPositions = [];
            
            for (let time = now.getTime(); time < endTime.getTime(); time += 60000) {
                const pos = getISSPosition(new Date(time));
                if (!pos) continue;
                
                const distance = haversineDistance(48.5, -72.4, pos.lat, pos.lon);
                const altitude = calculateAltitude(48.5, -72.4, distance, pos.alt);
                const visible = altitude > 0 && distance < 1500;
                
                if (visible && !inPass) {
                    inPass = true;
                    passPositions = [{ time, altitude, distance }];
                } else if (visible && inPass) {
                    passPositions.push({ time, altitude, distance });
                } else if (!visible && inPass) {
                    inPass = false;
                    
                    if (passPositions.length >= 1) {
                        const maxAlt = Math.max(...passPositions.map(p => p.altitude));
                        const minDist = Math.min(...passPositions.map(p => p.distance));
                        const duration = Math.round(passPositions.length);
                        
                        let quality = 'fair';
                        if (maxAlt > 50) quality = 'excellent';
                        else if (maxAlt > 25) quality = 'good';
                        
                        passes.push({
                            startTime: passPositions[0].time,
                            duration,
                            maxAltitude: Math.round(maxAlt),
                            minDistance: Math.round(minDist),
                            quality
                        });
                    }
                    passPositions = [];
                }
            }
            
            displayPasses(passes);
        }
        
        function displayPasses(passes) {
            const list = document.getElementById('passesList');
            
            if (passes.length === 0) {
                list.innerHTML = '<div class="loading">Aucun passage détecté dans les 24h</div>';
                return;
            }
            
            list.innerHTML = `<div class="crew-count">🛰️ ${passes.length} passage${passes.length > 1 ? 's' : ''} détecté${passes.length > 1 ? 's' : ''}</div>`;
            
            passes.forEach(pass => {
                const date = new Date(pass.startTime);
                const timeStr = date.toLocaleString('fr-CA', { 
                    weekday: 'short',
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit', 
                    minute: '2-digit'
                });
                
                const div = document.createElement('div');
                div.className = `pass-item ${pass.quality}`;
                div.innerHTML = `
                    <div class="pass-time">📅 ${timeStr}</div>
                    <div class="pass-details">
                        <div>⬆️ Alt: ${pass.maxAltitude}° | 📏 ${pass.minDistance} km | ⏱️ ${pass.duration} min</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        function calculateAltitude(obsLat, obsLon, distance, issAltKm) {
            const elevation = Math.atan2(issAltKm, distance) * 180 / Math.PI;
            return Math.max(0, elevation);
        }
        
        // Fonction pour tracer l'orbite future (90 minutes)
        function drawFutureOrbit() {
            if (!satrec) return;
            
            // Supprimer l'ancienne orbite future
            if (futureOrbitLayer) {
                map.removeLayer(futureOrbitLayer);
            }
            
            console.log('🟢 Calcul orbite future (90 min)...');
            
            const now = new Date();
            const futurePositions = [];
            
            // Calculer les positions toutes les 2 minutes pour les 90 prochaines minutes
            for (let i = 0; i <= 90; i += 2) {
                const futureTime = new Date(now.getTime() + i * 60 * 1000);
                const pos = getISSPosition(futureTime);
                
                if (pos) {
                    futurePositions.push([pos.lat, pos.lon]);
                }
            }
            
            if (futurePositions.length < 2) {
                console.warn('⚠ Pas assez de positions futures');
                return;
            }
            
            // Diviser en segments pour éviter les lignes qui traversent la carte
            let segments = [];
            let currentSegment = [futurePositions[0]];
            
            for (let i = 1; i < futurePositions.length; i++) {
                const prevLon = futurePositions[i - 1][1];
                const currLon = futurePositions[i][1];
                const lonDiff = Math.abs(currLon - prevLon);
                
                if (lonDiff > 150) {
                    if (currentSegment.length >= 2) {
                        segments.push([...currentSegment]);
                    }
                    currentSegment = [futurePositions[i]];
                } else {
                    currentSegment.push(futurePositions[i]);
                }
            }
            
            if (currentSegment.length >= 2) {
                segments.push([...currentSegment]);
            }
            
            console.log(`🟢 Orbite future: ${segments.length} segments, ${futurePositions.length} points`);
            
            // Créer un groupe de couches pour l'orbite future
            futureOrbitLayer = L.layerGroup();
            
            segments.forEach(segment => {
                const polyline = L.polyline(segment, {
                    color: '#fbbf24',
                    weight: 2,
                    opacity: 0.7,
                    dashArray: '10, 10',
                    smoothFactor: 1,
                    interactive: false,
                    pane: 'orbitPane'
                });
                futureOrbitLayer.addLayer(polyline);
            });
            
            futureOrbitLayer.addTo(map);
            
            console.log('✓ Orbite future tracée');
        }
        
        // Zones jour/nuit
        function updateDayNight() {
            if (terminatorLayer) {
                map.removeLayer(terminatorLayer);
            }
            terminatorLayer = L.terminator({
                fillColor: '#000033',
                fillOpacity: 0.5,
                color: '#3b82f6',
                opacity: 0.3,
                weight: 2
            }).addTo(map);
            terminatorLayer.bringToBack();
        }
        
        // Fonction pour récupérer et afficher les astronautes
        async function getAstronauts() {
            const astronautsList = document.getElementById('astronautsList');
            
            // Liste correcte des astronautes actuellement à bord (mars 2026)
            // Expédition 74/75 — mai 2026
            const correctCrew = [
                { name: 'Sergey Kud-Sverchkov', flag: '🇷🇺', agency: 'Roscosmos' },
                { name: 'Sergei Mikaev', flag: '🇷🇺', agency: 'Roscosmos' },
                { name: 'Christopher Williams', flag: '🇺🇸', agency: 'NASA' },
                { name: 'Jessica Meir', flag: '🇺🇸', agency: 'NASA' },

        // Zoom
        function setupZoom() {
            const slider = document.getElementById('zoomSlider');
            const level = document.getElementById('zoomLevel');
            const zoomIn = document.getElementById('zoomIn');
            const zoomOut = document.getElementById('zoomOut');
            
            slider.addEventListener('input', function() {
                const zoom = parseFloat(this.value);
                map.setZoom(zoom);
                level.textContent = zoom.toFixed(1);
            });
            
            map.on('zoomend', function() {
                const zoom = map.getZoom();
                slider.value = zoom;
                level.textContent = zoom.toFixed(1);
            });
            
            zoomIn.addEventListener('click', () => map.setZoom(Math.min(map.getZoom() + 0.5, 18)));
            zoomOut.addEventListener('click', () => map.setZoom(Math.max(map.getZoom() - 0.5, 1)));
        }
        
        // Rendre panneaux déplaçables
        function makeDraggable() {
            document.querySelectorAll('.panel').forEach(panel => {
                let isDragging = false;
                let currentX, currentY, initialX, initialY;
                let xOffset = 0, yOffset = 0;
                
                panel.addEventListener('mousedown', e => {
                    isDragging = true;
                    initialX = e.clientX - xOffset;
                    initialY = e.clientY - yOffset;
                });
                
                document.addEventListener('mousemove', e => {
                    if (isDragging) {
                        e.preventDefault();
                        currentX = e.clientX - initialX;
                        currentY = e.clientY - initialY;
                        xOffset = currentX;
                        yOffset = currentY;
                        panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                    }
                });
                
                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });
            });
        }
        
        // Initialisation principale
        async function init() {
            console.log('🚀 Initialisation...');
            
            initMap();
            await initTLE();
            
            if (!satrec) {
                alert('Erreur: Impossible de charger les TLE');
                return;
            }
            
            console.log('✓ TLE chargés');
            
            updateDayNight();
            updateISS();
            drawFutureOrbit(); // Tracer l'orbite future au démarrage
            getAstronauts(); // Charger les données des astronautes
            
            console.log('⏱️ Attente 30 secondes puis calcul des passages...');
            setTimeout(() => {
                console.log('📊 Début calcul passages...');
                calculatePasses();
            }, 30000);
            
            setupZoom();
            makeDraggable();
            
            setInterval(updateISS, 5000);
            setInterval(drawFutureOrbit, 60000); // Mettre à jour l'orbite future chaque minute
            setInterval(updateDayNight, 60000);
            setInterval(() => updateTLE().then(calculatePasses), 24 * 60 * 60 * 1000);
            setInterval(getAstronauts, 24 * 60 * 60 * 1000); // Mettre à jour les astronautes toutes les 24h
            
            console.log('✅ Application prête!');
            console.log('🛰️ ISS Tracker avec TLE fonctionnel');
        }
        
        // Lancer au chargement
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
